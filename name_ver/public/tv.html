<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로뎀카페 - 주문자 안내</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #2b211a;
    --panel: #3a2e24;
    --cream: #f4ead9;
    --accent: #d98e4a;
    --ready-glow: #6fbf73;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--cream);
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    overflow: hidden;
  }
  .header {
    text-align: center;
    padding: 28px 0 18px;
  }
  .header h1 {
    margin: 0;
    font-size: 40px;
    letter-spacing: 4px;
    color: var(--accent);
    font-weight: 800;
  }
  .header p {
    margin: 6px 0 0;
    font-size: 16px;
    color: #cbb89a;
    letter-spacing: 2px;
  }
  .board {
    display: flex;
    height: calc(100% - 110px);
    gap: 20px;
    padding: 0 24px 24px;
  }
  .col {
    flex: 1;
    background: var(--panel);
    border-radius: 20px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .col-title {
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 3px solid rgba(255,255,255,0.08);
    letter-spacing: 2px;
  }
  .col-title.preparing { color: #e8b96a; }
  .col-title.ready { color: var(--ready-glow); }

  .numbers {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-content: flex-start;
    overflow-y: auto;
  }
  .chip {
    background: rgba(255,255,255,0.06);
    border-radius: 16px;
    font-size: 42px;
    font-weight: 800;
    padding: 18px 30px;
    min-width: 120px;
    text-align: center;
    border: 2px solid rgba(255,255,255,0.08);
    white-space: nowrap;
    flex: 0 0 auto;
  }
  .col-title.preparing ~ .numbers .chip {
    color: #ffd9a0;
  }
  .ready-numbers .chip {
    color: #d7ffda;
    background: rgba(111,191,115,0.15);
    border-color: rgba(111,191,115,0.4);
    animation: pop 0.5s ease;
  }
  @keyframes pop {
    0% { transform: scale(0.6); opacity: 0; }
    60% { transform: scale(1.12); opacity: 1; }
    100% { transform: scale(1); }
  }
  .empty {
    color: #8a7861;
    font-size: 20px;
    text-align: center;
    width: 100%;
    margin-top: 40px;
  }
  .unlock-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 15, 10, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    cursor: pointer;
  }
  .unlock-overlay p {
    color: var(--cream);
    font-size: 28px;
    letter-spacing: 2px;
    padding: 40px 60px;
    border: 2px solid var(--accent);
    border-radius: 20px;
  }
</style>
</head>
<body>
  <div class="unlock-overlay" id="unlockOverlay">
    <p>화면을 터치하면 음성 안내가 시작됩니다</p>
  </div>
  <div class="header">
    <h1>로뎀카페</h1>
    <p>ORDER STATUS</p>
  </div>
  <div class="board">
    <div class="col">
      <div class="col-title preparing">준비중</div>
      <div class="numbers" id="preparing-list"></div>
    </div>
    <div class="col">
      <div class="col-title ready">준비완료</div>
      <div class="numbers ready-numbers" id="ready-list"></div>
    </div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  const unlockOverlay = document.getElementById('unlockOverlay');
  unlockOverlay.addEventListener('click', () => {
    // 브라우저 자동재생 정책 해제용: 사용자 클릭 시점에 무음 발화로 오디오 컨텍스트를 미리 열어둠
    const primer = new SpeechSynthesisUtterance(' ');
    speechSynthesis.speak(primer);
    unlockOverlay.remove();
  });
  const preparingList = document.getElementById('preparing-list');
  const readyList = document.getElementById('ready-list');

  function render(state) {
    renderCol(preparingList, state.preparing);
    renderCol(readyList, state.ready);
  }

  function escapeHtml(str) {
    return str.replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function renderCol(el, arr) {
    if (!arr.length) {
      el.innerHTML = '<div class="empty">-</div>';
      return;
    }
    el.innerHTML = arr.map(n => `<div class="chip">${escapeHtml(n)}</div>`).join('');
  }

  socket.on('state', render);

  socket.on('announce', (name) => {
    enqueueSpeech(`${name} 형제자매님 음료 준비되었습니다`);
  });

  // 장난감/캐릭터 음성(로봇 소리, 애니메이션 목소리 등)은 안내 방송에 어울리지 않아 제외
  const VOICE_BLOCKLIST = [
    'grandma', 'grandpa', 'rocko', 'eddy', 'flo', 'reed', 'sandy', 'shelley',
    'albert', 'bad news', 'bahh', 'bells', 'boing', 'bubbles', 'cellos',
    'wobble', 'trinoids', 'whisper', 'zarvox', 'jester', 'organ', 'superstar', 'good news'
  ];
  // 친근하고 자연스러운 목소리를 우선순위로 선택
  const VOICE_PRIORITY = ['유나', 'yuna', 'sora', 'nara', 'google 한국의'];

  let koreanVoice = null;
  function loadVoices() {
    const voices = speechSynthesis.getVoices();
    const koreanVoices = voices.filter(v => v.lang === 'ko-KR' || v.lang.startsWith('ko'));
    const candidates = koreanVoices.filter(
      v => !VOICE_BLOCKLIST.some(bad => v.name.toLowerCase().includes(bad))
    );
    for (const keyword of VOICE_PRIORITY) {
      const found = candidates.find(v => v.name.toLowerCase().includes(keyword));
      if (found) { koreanVoice = found; return; }
    }
    koreanVoice = candidates[0] || koreanVoices[0] || null;
  }
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();

  // 브라우저 내장 큐가 여러 발화를 겹쳐 재생하는 경우가 있어, 직접 큐를 두고 한 번에 하나씩만 재생
  const speechQueue = [];
  let isSpeaking = false;

  function enqueueSpeech(text) {
    speechQueue.push(text);
    playNextInQueue();
  }

  function playNextInQueue(retryCount = 0) {
    if (isSpeaking || speechQueue.length === 0) return;
    // 음성 목록이 아직 로딩 중이면(첫 안내가 시스템 기본 음성으로 잘못 재생되는 것을 방지)
    // 최대 2초까지 기다렸다가 재생한다.
    if (!koreanVoice && retryCount < 20) {
      loadVoices();
      setTimeout(() => playNextInQueue(retryCount + 1), 100);
      return;
    }
    isSpeaking = true;
    const text = speechQueue.shift();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ko-KR';
    if (koreanVoice) utter.voice = koreanVoice;
    utter.rate = 0.95;
    utter.pitch = 1.05;
    utter.onend = utter.onerror = () => {
      isSpeaking = false;
      playNextInQueue();
    };
    speechSynthesis.speak(utter);
  }
</script>
</body>
</html>
