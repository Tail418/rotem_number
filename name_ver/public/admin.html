<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로뎀카페 - 주문자 관리</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  :root {
    --bg: #f7f1e8;
    --panel: #ffffff;
    --brown: #4a3826;
    --accent: #d98e4a;
    --ready-green: #6fbf73;
    --danger: #d9534f;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--brown);
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    min-height: 100%;
  }
  .header {
    padding: 20px 20px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h1 {
    margin: 0;
    font-size: 24px;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .reset-btn {
    background: var(--danger);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 15px;
    font-weight: 700;
  }

  .input-area {
    padding: 10px 20px 20px;
    display: flex;
    gap: 10px;
  }
  #nameInput {
    flex: 1;
    font-size: 24px;
    padding: 16px;
    border-radius: 14px;
    border: 2px solid #e0d3bf;
    text-align: center;
    font-weight: 700;
    color: var(--brown);
  }
  #addBtn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 0 26px;
    font-size: 20px;
    font-weight: 800;
  }

  .section {
    padding: 8px 20px;
  }
  .section h2 {
    font-size: 18px;
    margin: 10px 0;
    letter-spacing: 1px;
  }
  .section h2.preparing { color: #b9762c; }
  .section h2.ready { color: #3f8f43; }

  .list {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .card {
    background: var(--panel);
    border-radius: 16px;
    padding: 14px 18px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 130px;
  }
  .card .name {
    font-size: 22px;
    font-weight: 800;
    flex: 1;
  }
  .card button {
    border: none;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    font-weight: 700;
    color: white;
  }
  .card.preparing .name { color: #b9762c; }
  .card.preparing .done-btn { background: var(--ready-green); }
  .card.preparing .cancel-btn { background: #bbb; }

  .card.ready .name { color: #3f8f43; }
  .card.ready .undo-btn { background: #ccc; color: #333; }

  .empty {
    color: #b3a48c;
    font-size: 15px;
    padding: 8px 0;
  }
</style>
</head>
<body>
  <div class="header">
    <h1>로뎀카페 · 관리</h1>
    <button class="reset-btn" id="resetBtn">전체 초기화</button>
  </div>

  <div class="input-area">
    <input id="nameInput" type="text" placeholder="이름 입력">
    <button id="addBtn">등록</button>
  </div>

  <div class="section">
    <h2 class="preparing">준비중</h2>
    <div class="list" id="preparingList"></div>
  </div>

  <div class="section">
    <h2 class="ready">준비완료</h2>
    <div class="list" id="readyList"></div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  const nameInput = document.getElementById('nameInput');
  const addBtn = document.getElementById('addBtn');
  const resetBtn = document.getElementById('resetBtn');
  const preparingList = document.getElementById('preparingList');
  const readyList = document.getElementById('readyList');

  function addName() {
    const val = nameInput.value.trim();
    if (!val) return;
    socket.emit('add-name', val);
    nameInput.value = '';
    nameInput.focus();
  }

  addBtn.addEventListener('click', addName);
  nameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addName();
  });

  resetBtn.addEventListener('click', () => {
    if (confirm('준비중/준비완료 목록을 모두 초기화할까요?')) {
      socket.emit('reset-all');
    }
  });

  socket.on('state', (state) => {
    renderPreparing(state.preparing);
    renderReady(state.ready);
  });

  function escapeHtml(str) {
    return str.replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function renderPreparing(arr) {
    if (!arr.length) {
      preparingList.innerHTML = '<div class="empty">등록된 이름이 없습니다</div>';
      return;
    }
    preparingList.innerHTML = arr.map(n => `
      <div class="card preparing">
        <div class="name">${escapeHtml(n)}</div>
        <button class="done-btn" data-name="${escapeHtml(n)}">완료</button>
        <button class="cancel-btn" data-name="${escapeHtml(n)}">취소</button>
      </div>
    `).join('');

    preparingList.querySelectorAll('.done-btn').forEach(btn => {
      btn.addEventListener('click', () => socket.emit('mark-ready', btn.dataset.name));
    });
    preparingList.querySelectorAll('.cancel-btn').forEach(btn => {
      btn.addEventListener('click', () => socket.emit('remove-preparing', btn.dataset.name));
    });
  }

  function renderReady(arr) {
    if (!arr.length) {
      readyList.innerHTML = '<div class="empty">완료된 이름이 없습니다</div>';
      return;
    }
    readyList.innerHTML = arr.map(n => `
      <div class="card ready">
        <div class="name">${escapeHtml(n)}</div>
        <button class="undo-btn" data-name="${escapeHtml(n)}">되돌리기</button>
      </div>
    `).join('');

    readyList.querySelectorAll('.undo-btn').forEach(btn => {
      btn.addEventListener('click', () => socket.emit('undo-ready', btn.dataset.name));
    });
  }
</script>
</body>
</html>
